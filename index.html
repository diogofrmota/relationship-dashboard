<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Track your favorite movies, TV shows, anime, and books">
  <meta name="theme-color" content="#FAEDDA">
  <title>Shared Shelf - Homepage</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS for maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Fix Leaflet default icon paths -->
  <script>
    // Prevent Leaflet 404s for marker icons
    (function() {
      var originalInit = L.Icon.Default.prototype._setIconStyles;
      L.Icon.Default.mergeOptions({
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      });
    })();
  </script>

  <style>
    :root {
      --app-bg: #FAEDDA;
      --app-surface: rgba(255, 252, 246, 0.96);
      --app-surface-soft: rgba(174, 232, 202, 0.28);
      --app-overlay: rgba(60, 47, 128, 0.72);
      --app-text: #3C2F80;
      --app-text-muted: rgba(60, 47, 128, 0.76);
      --app-text-subtle: rgba(60, 47, 128, 0.74);
      --app-title: #3C2F80;
      --app-primary: #3C2F80;
      --app-primary-strong: #2C2366;
      --app-accent-cool: #26B6C6;
      --app-accent-warm: #6ACFC9;
      --app-mint: #AEE8CA;
      --app-accent-soft: rgba(174, 232, 202, 0.46);
      --app-accent-cool-soft: rgba(38, 182, 198, 0.18);
      --app-accent-warm-soft: rgba(106, 207, 201, 0.24);
      --app-border: #6ACFC9;
      --app-border-soft: rgba(60, 47, 128, 0.16);
      --app-border-faint: rgba(60, 47, 128, 0.1);
      --app-light-surface: #FFFCF6;
      --app-light-surface-hover: #E6F7E7;
      --app-on-light: #3C2F80;
      --app-on-accent: #FAEDDA;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(174, 232, 202, 0.46), transparent 28%),
        radial-gradient(circle at top right, rgba(38, 182, 198, 0.18), transparent 26%),
        linear-gradient(180deg, #FFF8E9 0%, var(--app-bg) 48%, #EAF6DC 100%);
      color: var(--app-text);
    }

    #root {
      min-height: 100vh;
      background: transparent;
    }

    /* Ensure Leaflet map container has a defined height */
    .leaflet-container {
      height: 100%;
      width: 100%;
      background: #E6F7E7;
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--app-title) !important;
    }

    a {
      color: var(--app-title);
    }

    ::selection {
      background: var(--app-border);
      color: var(--app-on-light);
    }

    [class*="bg-gradient-to-"] {

      background-color: var(--app-surface) !important;

    [class~="text-slate-200"],

    [class~="text-purple-200"],

    [class~="text-red-300"],

    }

    [class~="border-slate-600"],
    [class~="border-slate-700"],
    [class~="border-slate-700/50"],
    [class~="border-slate-700/60"],
    [class~="border-slate-800"],
    [class~="border-slate-800/50"],
    [class~="border-slate-900"],
    [class~="border-white/10"],
    [class~="border-white/15"],
    [class~="border-white/20"],
    [class~="border-white/25"],
    [class~="border-white/40"],
    [class~="border-pink-500/30"],
    [class~="border-purple-500"],
    [class~="border-purple-500/30"],
    [class~="border-purple-500/50"],
    [class~="border-purple-500/60"],
    [class~="border-red-500/30"],
    [class~="border-slate-500/30"] {
      border-color: var(--app-border-soft) !important;
    }

    [class~="border-blue-500/30"],
    [class~="border-emerald-500/30"],
    [class~="border-green-500/30"] {
      border-color: rgba(38, 182, 198, 0.38) !important;
    }

    [class~="border-amber-500/30"],
    [class~="border-orange-500/30"],
    [class~="border-yellow-500/30"] {
      border-color: rgba(106, 207, 201, 0.38) !important;
    }

    [class~="hover:border-purple-500"]:hover,
    [class~="hover:border-purple-500/50"]:hover,
    [class~="hover:border-white/25"]:hover,
    [class~="hover:border-white/40"]:hover {
      border-color: var(--app-title) !important;
    }

    [class~="border-t-purple-500"] {
      border-top-color: var(--app-title) !important;
    }

    [class~="accent-purple-500"],
    [class~="accent-purple-600"] {
      accent-color: var(--app-title);
    }

    [class~="ring-purple-500"] {
      --tw-ring-color: rgba(38, 182, 198, 0.38) !important;
    }

    [class~="ring-white"] {
      --tw-ring-color: rgba(250, 237, 218, 0.95) !important;
    }

    [class~="ring-offset-slate-800"] {
      --tw-ring-offset-color: var(--app-bg) !important;
    }

    [class~="shadow-purple-500/40"],
    [class~="shadow-purple-900/20"],
    [class~="shadow-purple-900/30"],
    [class~="shadow-purple-900/40"],
    [class~="shadow-red-900/30"] {
      --tw-shadow-color: rgba(60, 47, 128, 0.18) !important;
    }

    :is(
      [class~="bg-white"],
      [class~="bg-white/5"],
      [class~="bg-white/10"],

      [class~="bg-purple-500/10"],
      [class~="bg-purple-500/20"],
      [class~="bg-purple-500/30"],

      [class~="bg-purple-700"],
      [class~="bg-blue-500/10"],
      [class~="bg-blue-500/20"],
      [class~="bg-green-400"],
      [class~="bg-green-500/10"],
      [class~="bg-green-500/20"],
      [class~="bg-orange-500/10"],
      [class~="bg-orange-500/20"],
      [class~="bg-pink-500/20"],
      [class~="bg-red-500/10"],
      [class~="bg-red-500/20"],

      [class~="bg-red-700"],
      [class~="bg-slate-500"],
      [class~="bg-slate-500/10"],
      [class~="bg-slate-500/20"],
      [class~="bg-slate-600"],
      [class~="bg-slate-700"],
      [class~="bg-slate-700/30"],
      [class~="bg-slate-700/50"],
      [class~="bg-slate-700/60"],
      [class~="bg-slate-700/80"],
      [class~="bg-slate-800"],
      [class~="bg-slate-800/20"],
      [class~="bg-slate-800/40"],
      [class~="bg-slate-800/50"],
      [class~="bg-slate-800/60"],

      [class~="text-black"],
      [class~="text-slate-200"],
      [class~="text-slate-300"],
      [class~="text-slate-400"],
      [class~="text-slate-500"],
      [class~="text-slate-600"],
      [class~="text-slate-950"],
      [class~="text-amber-300"],
      [class~="text-blue-300"],
      [class~="text-blue-400"],
      [class~="text-emerald-400"],

      [class~="text-purple-100"],

    }

    :is(

    textarea,

      caret-color: var(--app-on-light);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(60, 47, 128, 0.72) !important;
    }

<body>
  <div id="root"></div>

  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Leaflet JS for maps -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ============================================ -->
  <!-- GLOBAL CONFIGURATION                          -->
  <!-- ============================================ -->
  <script>
    // Same-origin API calls: whichever deployment (production or preview)
    // serves this page also serves /api/*. Leaving this empty makes fetch
    // calls resolve relative to window.location.origin.
    window.API_BASE_URL = '';

    // TMDB API key (set this to your actual key or leave empty if using your backend)
    window.TMDB_API_KEY = '';
  </script>

  <!-- ============================================ -->
  <!-- UTILITY SCRIPTS (load before components)      -->
  <!-- ============================================ -->
  <script type="text/babel" src="./utils/api.js"></script>
  <script type="text/babel" src="./utils/storage.js"></script>

  <!-- ============================================ -->
  <!-- APP COMPONENTS (load in dependency order)     -->
  <!-- ============================================ -->
  <script type="text/babel" src="./components/Config.jsx"></script>
  <script type="text/babel" src="./components/Icons.jsx"></script>
  <script type="text/babel" src="./components/UI.jsx"></script>
  <script type="text/babel" src="./components/MediaCard.jsx"></script>
  <script type="text/babel" src="./components/ProfileModal.jsx"></script>
  <script type="text/babel" src="./components/SearchModal.jsx"></script>
  <script type="text/babel" src="./components/GlobalSearchModal.jsx"></script>
  <script type="text/babel" src="./components/Header.jsx"></script>
  <script type="text/babel" src="./components/AddModal.jsx"></script>
  <script type="text/babel" src="./components/CalendarView.jsx"></script>
  <script type="text/babel" src="./components/TripsView.jsx"></script>
  <script type="text/babel" src="./components/RecipesView.jsx"></script>
  <script type="text/babel" src="./components/DatesView.jsx"></script>
  <script type="text/babel" src="./components/TasksView.jsx"></script>
  <script type="text/babel" src="./components/MediaSectionsView.jsx"></script>
  <script type="text/babel" src="./components/Login.jsx"></script>
  <script type="text/babel" src="./components/ShelfSelector.jsx"></script>
  <script type="text/babel" src="./components/JoinShelfModal.jsx"></script>
  <script type="text/babel" src="./components/ShareShelfModal.jsx"></script>

  <!-- ============================================ -->
  <!-- MAIN APP                                      -->
  <!-- ============================================ -->
  <script type="text/babel" src="./media-tracker.jsx"></script>

  <script type="text/babel">
    // Wait for all scripts to load and transform before rendering
    setTimeout(() => {
      if (typeof MediaTracker === 'undefined') {
        console.error('MediaTracker component not found - check that all scripts loaded correctly');
        document.getElementById('root').innerHTML = '<div style="color:white;text-align:center;padding:2rem;">Failed to load application. Please check the console for errors.</div>';
        return;
      }
      const { createRoot } = ReactDOM;
      const root = createRoot(document.getElementById('root'));
      root.render(<MediaTracker />);
    }, 500); // Increased timeout to give Babel more time to process all files
  </script>
</body>
</html>
