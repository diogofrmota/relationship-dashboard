<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Track your favorite movies, TV shows, anime, and books">
  <meta name="theme-color" content="#7c3aed">
  <title>Diogo & Mónica - Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS for maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
    }

    /* Ensure Leaflet map container has a defined height */
    .leaflet-container {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Leaflet JS for maps -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Your App -->
  <script type="text/babel" src="./media-tracker.jsx"></script>

  <script type="text/babel">
    setTimeout(() => {
      if (typeof MediaTracker === 'undefined') {
        console.error('MediaTracker component not found');
        return;
      }
      const { createRoot } = ReactDOM;
      const root = createRoot(document.getElementById('root'));
      root.render(<MediaTracker />);
    }, 100);
  </script>
</body>
</html>
